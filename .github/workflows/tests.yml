name: Tests

# This repository owns a test suite; a missing/empty collection is a CI failure.
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[test]"

      - name: Collect test suite
        run: |
          python -m pytest --collect-only -q | tee "$RUNNER_TEMP/pytest-collection.log"
          grep -Eq '[1-9][0-9]* tests collected' "$RUNNER_TEMP/pytest-collection.log"

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Build and smoke clean wheel install
        run: |
          rm -rf dist .wheel-smoke
          python -m pip wheel . --wheel-dir dist
          python -m venv .wheel-smoke
          .wheel-smoke/bin/pip install dist/paulsha_hippo-*.whl
          cd /tmp
          "$GITHUB_WORKSPACE/.wheel-smoke/bin/hippo" --version
          "$GITHUB_WORKSPACE/.wheel-smoke/bin/hippo" recovery --help >/dev/null
          "$GITHUB_WORKSPACE/.wheel-smoke/bin/python" -c 'from paulsha_hippo.atomizer.config import load_config; c, _ = load_config(override_path=None); assert c.context_window == 32768 and c.max_input_tokens == 12000'
          export HOME="$RUNNER_TEMP/hippo-wheel-home"
          mkdir -p "$HOME"
          "$GITHUB_WORKSPACE/.wheel-smoke/bin/hippo" install hooks --memory-root "$RUNNER_TEMP/hippo-wheel-memory"
          test -f "$RUNNER_TEMP/hippo-wheel-memory/hooks/codex_session_end.py"
          grep -F "$GITHUB_WORKSPACE/.wheel-smoke/bin/python" "$HOME/.codex/hooks.json"
          doctor_rc=0
          "$GITHUB_WORKSPACE/.wheel-smoke/bin/hippo" doctor >"$RUNNER_TEMP/hippo-doctor.log" 2>&1 || doctor_rc=$?
          test "$doctor_rc" -le 1
          ! grep -Eq 'Traceback|TypeError' "$RUNNER_TEMP/hippo-doctor.log"
